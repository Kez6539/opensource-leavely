name: PR Preview (Leavely)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'
      - 'LICENSE'

concurrency:
  group: leavely-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    name: Build + deploy preview
    if: ${{ vars.ENABLE_PR_PREVIEWS == 'true' && github.event.pull_request.draft == false }}
    runs-on: [self-hosted, hermes]
    env:
      CI: true
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      SESSION_PASSWORD: ${{ secrets.SESSION_PASSWORD }}
      NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
      NEXT_PUBLIC_APP_URL: https://leavely.online
      CLOUDFLARE_HYPERDRIVE_LOCAL_CONNECTION_STRING_HYPERDRIVE: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: npx prisma generate

      # Lint mirrors what the production deploy enforces. We let it continue here so the
      # preview still builds and the lint result is reported on the PR — but a final step
      # below FAILS the check on lint errors, so the PR cannot (auto-)merge until clean.
      - name: Lint
        id: lint
        continue-on-error: true
        run: |
          if pnpm lint > lint-out.txt 2>&1; then
            echo "result=clean" >> "$GITHUB_OUTPUT"
          else
            echo "result=errors" >> "$GITHUB_OUTPUT"
          fi
          tail -50 lint-out.txt
          # capture just the error lines for the PR comment
          grep -E "[0-9]+:[0-9]+ +error" lint-out.txt | head -20 > lint-errors.txt || true

      - name: Build (OpenNext)
        run: npx opennextjs-cloudflare build && node scripts/patch-wasm.mjs

      - name: Upload Cloudflare preview version
        id: preview
        run: |
          set -o pipefail
          out=$(npx wrangler@4 versions upload 2>&1 | tee /dev/stderr)
          url=$(echo "$out" | grep -oE 'https://[a-z0-9-]+-leavely\.[a-z0-9-]+\.workers\.dev' | head -1 || true)
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Comment preview link on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const url = '${{ steps.preview.outputs.url }}';
            const lint = '${{ steps.lint.outputs.result }}';
            let lintMsg = lint === 'clean'
              ? '✅ **Lint:** clean'
              : '⚠️ **Lint:** errors — this check is now BLOCKING, fix before merge (the production deploy enforces these too):';
            if (lint !== 'clean') {
              let errs = '';
              try { errs = fs.readFileSync('lint-errors.txt', 'utf8').trim(); } catch (e) {}
              if (errs) lintMsg += '\n```\n' + errs.slice(0, 1500) + '\n```';
            }
            const preview = url
              ? `🔎 **Live preview:** ${url}\n_(Cloudflare preview — 0% production traffic. Merge to ship live.)_`
              : '⚠️ Preview built but no URL captured — see the workflow logs.';
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `${preview}\n\n${lintMsg}`
            });

      # BLOCKING gate: fail the workflow if lint reported errors, so the PR check goes red
      # and the (auto-)merge is held until lint is clean — matching the strict prod deploy.
      - name: Fail check on lint errors
        if: steps.lint.outputs.result != 'clean'
        run: |
          echo "::error::Lint reported errors — failing this check so the PR cannot merge until fixed."
          exit 1
